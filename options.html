<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gambling Blocker — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #111;
    }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin: 28px 0 8px;
    }
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .site-row label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }
    .remove-btn:hover { color: #c00; }
    .add-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .add-row button {
      padding: 8px 16px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Gambling Blocker — Settings</h1>

  <h2>Blocked Sites</h2>
  <div id="default-sites"></div>

  <h2>Your Custom Sites</h2>
  <div id="custom-sites"></div>
  <div class="add-row">
    <input id="new-site" type="text" placeholder="e.g. mybookies.com">
    <button id="add-btn">+ Add</button>
  </div>

  <script src="sites.js"></script>
  <script src="options.js"></script>
</body>
</html>
