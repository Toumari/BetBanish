<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 24px;
  }
  .icon-circle {
    flex-shrink: 0;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: #1c1c1c;
    border: 2px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 86px;
    color: #c00;
    line-height: 1;
  }
  .text {
    flex: 1;
    min-width: 0;
  }
  .name {
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .name span { color: #c00; }
  .tagline {
    font-size: 14px;
    color: #777;
    margin-bottom: 22px;
    font-weight: 400;
  }
  .features {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    color: #bbb;
  }
  .feature::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c00;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="icon-circle">£</div>
  <div class="text">
    <div class="name">Bet<span>Banish</span></div>
    <div class="tagline">Stop and think before you gamble.</div>
    <div class="features">
      <div class="feature">10-second pause on every visit</div>
      <div class="feature">See exactly what you'll lose</div>
      <div class="feature">65+ UK betting sites covered</div>
    </div>
  </div>
</body>
</html>
